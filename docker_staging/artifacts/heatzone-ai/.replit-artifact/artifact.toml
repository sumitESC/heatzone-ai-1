kind = "web"
previewPath = "/"
title = "HeatZone AI"
version = "1.0.0"
id = "artifacts/heatzone-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22699
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/heatzone-ai run dev"

[services.env]
PORT = "22699"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/heatzone-ai", "run", "build"]
publicDir = "artifacts/heatzone-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
